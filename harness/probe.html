<!doctype html>
<html lang="fr" data-falcon-probe-ready="false">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Falcon Enterprise — sonde EI-16.4</title>
  <style>
    body{font-family:system-ui,sans-serif;margin:0;background:#071321;color:#eaf4ff}
    iframe{width:100%;height:70vh;border:0;background:white}
    pre{white-space:pre-wrap;padding:1rem;margin:0;font-size:12px}
  </style>
</head>
<body>
  <iframe id="candidate" src="./index.html" title="Candidat Falcon Enterprise exact"></iframe>
  <pre id="result">Sonde en attente du runtime Enterprise…</pre>
  <script>
    (() => {
      const EXPECTED_RUNTIME_VERSION = "V48.0.0-dev";
      const TRIAL_CAPABILITIES = ["observe","analyse","report"];
      const frame = document.querySelector("#candidate");
      const result = document.querySelector("#result");
      const expectedTier = new URLSearchParams(location.search).get("expected") || "enterprise";
      let attempts = 0;

      const sameList = (left, right) => JSON.stringify(left) === JSON.stringify(right);

      async function capture() {
        attempts += 1;
        const api = frame.contentWindow?.FalconEnterprise;
        if (!api && attempts < 100) {
          setTimeout(capture, 100);
          return;
        }
        if (!api) {
          result.textContent = JSON.stringify({ ready: false, issues: ["ENTERPRISE_RUNTIME_UNAVAILABLE"] }, null, 2);
          return;
        }

        try {
          if (!new Set(["trial", "enterprise"]).has(expectedTier)) throw new Error("UNSUPPORTED_EXPECTED_TIER");
          const response = await fetch("./owner-test-activation.json", { cache: "no-store" });
          if (!response.ok) throw new Error("ACTIVATION_CONTRACT_UNAVAILABLE");
          const activation = await response.json();
          const snapshot = api.snapshot();
          const counts = {
            missions: snapshot.runtime?.missions?.missionCount ?? null,
            sessions: snapshot.runtime?.sessions?.sessionCount ?? null,
            folders: snapshot.runtime?.folders?.folderCount ?? null,
            observations: snapshot.runtime?.observations?.observationCount ?? null,
            media: snapshot.runtime?.media?.mediaCount ?? null,
            reports: snapshot.runtime?.reports?.reportCount ?? null
          };
          const runtimeEmpty = Object.values(counts).every((value) => value === 0);
          const expectedCapabilities = expectedTier === "enterprise" ? activation.expectedCapabilities : TRIAL_CAPABILITIES;
          const expectedProfile = expectedTier === "enterprise" ? activation.applicationProfile : "Consultant Senior";
          const issues = [];

          if (snapshot.version !== EXPECTED_RUNTIME_VERSION) issues.push("RUNTIME_VERSION");
          if (snapshot.mode !== "production") issues.push("MODE_NOT_PRODUCTION");
          if (!runtimeEmpty) issues.push("RUNTIME_NOT_EMPTY");
          if (snapshot.profile !== expectedProfile) issues.push("APPLICATION_PROFILE");
          if (snapshot.license?.tier !== expectedTier) issues.push("LICENSE_TIER");
          if (snapshot.license?.allowed !== true || snapshot.license?.decision !== "granted") issues.push("LICENSE_DECISION");
          if (!sameList(snapshot.license?.capabilities, expectedCapabilities)) issues.push("LICENSE_CAPABILITIES");
          if (expectedTier === "enterprise" && snapshot.license?.licenseId !== activation.license?.licenseId) issues.push("LICENSE_ID");
          if (expectedTier === "enterprise" && snapshot.license?.userProfile !== activation.applicationProfile) issues.push("LICENSE_PROFILE");

          const ready = issues.length === 0;
          const phase = expectedTier === "trial" ? "preactivation" : "postactivation";
          const facts = {
            schema: "falcon.owner-test.browser-probe.v2",
            ready,
            phase,
            expectedTier,
            mode: snapshot.mode,
            applicationProfile: snapshot.profile,
            runtimeVersion: snapshot.version,
            runtimeEmpty,
            counts,
            license: snapshot.license ?? null,
            proofScope: expectedTier === "trial" ? "clean-browser-default" : "persisted-enterprise-test-activation",
            humanWorkflowPass: false,
            cryptographicLicenseProof: false,
            issues
          };

          document.documentElement.dataset.falconProbeReady = String(ready);
          document.documentElement.dataset.falconProbePhase = phase;
          document.documentElement.dataset.falconMode = String(snapshot.mode ?? "unknown");
          document.documentElement.dataset.falconRuntimeEmpty = String(runtimeEmpty);
          document.documentElement.dataset.falconLicenseTier = String(snapshot.license?.tier ?? "unknown");
          document.documentElement.dataset.falconLicenseId = String(snapshot.license?.licenseId ?? "unknown");
          document.documentElement.dataset.falconLicenseAllowed = String(snapshot.license?.allowed === true);
          document.documentElement.dataset.falconCapabilityCount = String(snapshot.license?.capabilities?.length ?? 0);
          document.documentElement.dataset.falconApplicationProfile = String(snapshot.profile ?? "unknown");
          window.__falconOwnerTestProbe = Object.freeze(facts);
          result.textContent = JSON.stringify(facts, null, 2);
        } catch (error) {
          document.documentElement.dataset.falconProbeReady = "false";
          result.textContent = JSON.stringify({
            schema: "falcon.owner-test.browser-probe.v2",
            ready: false,
            issues: [error instanceof Error ? error.message : String(error)]
          }, null, 2);
        }
      }

      frame.addEventListener("load", capture, { once: true });
    })();
  </script>
</body>
</html>
