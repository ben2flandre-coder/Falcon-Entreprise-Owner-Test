name: Qualify and deploy owner test candidate

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: owner-test-pages
  cancel-in-progress: true

jobs:
  qualify:
    name: Qualify final R6 owner candidate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify source-bound candidate
        run: node scripts/qualify-candidate.mjs

      - name: Check every deployed JavaScript module
        run: find candidate/src -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload qualified candidate
        uses: actions/upload-pages-artifact@v4
        with:
          path: candidate

  deploy:
    name: Deploy owner test site
    needs: qualify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
