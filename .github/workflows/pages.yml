name: Qualify and deploy owner test candidate

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: owner-test-pages
  cancel-in-progress: true

jobs:
  qualify:
    name: Qualify current owner-test candidate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check required entrypoints
        run: |
          test -f candidate/index.html
          test -f candidate/activate.html
          test -f candidate/owner-test-activation.json
          test -f candidate/test-context.json
          test -f candidate/src/app/showcase-enterprise-bootstrap.js
          test -f candidate/src/app/owner-product-polish.js
          test -f candidate/src/app/showcase-polish.css

      - name: Check every deployed JavaScript module
        run: find candidate/src -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Verify current Enterprise owner corrections and provenance
        run: |
          grep -q 'owner-product-polish.js' candidate/src/app/showcase-enterprise-bootstrap.js
          grep -q 'Falcon Enterprise' candidate/src/app/owner-product-polish.js
          grep -q 'falcon_owner_theme_v1' candidate/src/app/owner-product-polish.js
          grep -q 'Charger démo avancée' candidate/src/app/owner-product-polish.js
          grep -q 'dd741fbbea8b4f459cb5af64dc6dafcc62f65b60' candidate/activate.html
          grep -q 'dd741fbbea8b4f459cb5af64dc6dafcc62f65b60' candidate/owner-test-activation.json
          grep -q 'dd741fbbea8b4f459cb5af64dc6dafcc62f65b60' candidate/test-context.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload qualified candidate
        uses: actions/upload-pages-artifact@v4
        with:
          path: candidate

  deploy:
    name: Deploy owner test site
    needs: qualify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
