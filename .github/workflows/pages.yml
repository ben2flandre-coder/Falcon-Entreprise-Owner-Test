name: Qualify and deploy owner test candidate

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: owner-test-pages
  cancel-in-progress: true

jobs:
  qualify:
    name: Qualify final R6 owner candidate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify source-bound candidate
        run: node scripts/qualify-candidate.mjs

      - name: Check every deployed JavaScript module
        run: find candidate/src -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload qualified candidate
        uses: actions/upload-pages-artifact@v4
        with:
          path: candidate

  deploy:
    name: Deploy owner test site
    needs: qualify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-status:
    name: Publish owner test qualification status
    if: always()
    needs: [qualify, deploy]
    runs-on: ubuntu-24.04
    steps:
      - name: Publish final Pages status
        env:
          GH_TOKEN: ${{ github.token }}
          QUALIFY_RESULT: ${{ needs.qualify.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          actions_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          if [ "${QUALIFY_RESULT}" = "success" ] && [ "${DEPLOY_RESULT}" = "success" ]; then
            state="success"
            description="Owner candidate qualified and deployed"
            target_url="${PAGE_URL:-${actions_url}}"
          else
            state="failure"
            description="Owner qualification or deployment failed"
            target_url="${actions_url}"
          fi

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="${state}" \
            -f context="falcon/owner-test-pages" \
            -f description="${description}" \
            -f target_url="${target_url}"
